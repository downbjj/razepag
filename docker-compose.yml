services:
  mysql:
    image: mysql:8.0
    container_name: mysql_payment
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-razepag}
      MYSQL_USER: ${MYSQL_USER:-razepaguser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-razepagpass}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - payment_network

  redis:
    image: redis:7-alpine
    container_name: redis_payment
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispassword}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispassword}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - payment_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend_payment
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-razepaguser}:${MYSQL_PASSWORD:-razepagpass}@mysql:3306/${MYSQL_DATABASE:-razepag}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispassword}@redis:6379
      NODE_ENV: production
      PORT: 3001
      BASE_URL: ${BASE_URL:-http://localhost:3000}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@razepague.com}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - payment_network
    ports:
      - "3001:3001"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://backend:3001
    container_name: frontend_payment
    env_file:
      - .env
    environment:
      PORT: 3000
      BACKEND_URL: http://backend:3001
    depends_on:
      - backend
    networks:
      - payment_network
    ports:
      - "3000:3000"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: nginx_payment
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - payment_network
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:

networks:
  payment_network:
    driver: bridge
